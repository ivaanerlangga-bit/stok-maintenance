    <script>

      /* ========= BEEP ENGINE ========= */
      let audioCtx = null;

      function initAudio() {
        if (!audioCtx) {
          const AudioContext = window.AudioContext || window.webkitAudioContext;
          audioCtx = new AudioContext();
        }
      }

      function playBeep() {
        if (!audioCtx) return;

        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();

        osc.type = 'square';
        osc.frequency.value = 1000;
        gain.gain.value = 0.25;

        osc.connect(gain);
        gain.connect(audioCtx.destination);

        osc.start();
        setTimeout(() => osc.stop(), 120);
      }

function playSaveBeep() {
  if (!audioCtx) return;

  // 🔥 PENTING
  if (audioCtx.state === 'suspended') {
    audioCtx.resume();
  }

  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();

  osc.type = 'square';
  osc.frequency.value = 1000;
  gain.gain.value = 0.25;

  osc.connect(gain);
  gain.connect(audioCtx.destination);

  osc.start();
  setTimeout(() => osc.stop(), 120);
}

      const msg = document.getElementById('msg');

      const elCode = document.getElementById('code');
      const elName = document.getElementById('name');
      const elType = document.getElementById('type');
      const elQty = document.getElementById('qty');
      const elStok = document.getElementById('stok');
      const btnSave = document.getElementById('btnSave');
      // 🔒 Awal: tombol tidak aktif
btnSave.disabled = true;
btnSave.style.opacity = '0.5';
      const elPetugas = document.getElementById('petugas');


let isPurchasingLoggedIn = false;

elPetugas.addEventListener('change', () => {

  const p = elPetugas.value.toUpperCase();

  btnSave.disabled = true;
  btnSave.style.opacity = '0.5';

  if (!p) return;

    document.getElementById('typeWrapper').style.display = 'none';
    elType.value = 'KELUAR';

    btnSave.style.opacity = '1';
    return;
  }

  if (p === 'PURCHASING' && !isPurchasingLoggedIn) {
    openPwModal();
    return;
  }

});

function askPassword() {

  const pw = prompt("Masukkan Password Purchasing:");

  if (pw === null) {

  }

function showLoading() {
  btnSave.disabled = true;
  btnSave.classList.add('loading-btn');
  btnSave.textContent = "Menyimpan...";
}

function hideLoading() {
  btnSave.disabled = false;
  btnSave.classList.remove('loading-btn');

}
      /* ========= MASTER LIST + SUGGEST (HP FRIENDLY) ========= */
      let MASTER = [];

      function renderSuggest(items) {
        const box = document.getElementById('suggestBox');
        if (!box) return;

        if (!items || !items.length) {
          box.style.display = 'none';
          box.innerHTML = '';
          return;
        }

        box.innerHTML = items.map(it => {
          const kode = (it.code || it.barcode || '').replace(/"/g, '&quot;');
          const nama = (it.name || '').replace(/</g, '&lt;').replace(/>/g, '&gt;');

return `
  <div data-code="${kode}"
      style="
        padding:26px 22px;
        border-bottom:4px solid #e5e5e5;
        cursor:pointer;
        display:flex;
        align-items:center;
        gap:18px;
        background:white;
        font-size:38px;
        font-weight:900;
      ">
      
      <span style="white-space:nowrap;">
        ${kode}
      </span>

      <span style="
        font-weight:900;
        color:#888;
      ">
        |
      </span>

      <span style="
        flex:1;
        font-weight:900;
        color:#111;
      ">
        ${nama}
      </span>

  </div>
`;
        }).join('');

        box.style.display = 'block';
        

        box.querySelectorAll('[data-code]').forEach(el => {
el.addEventListener('click', () => {

  const kode = el.getAttribute('data-code');

  playBeep();

  // SET VALUE DULU
  elCode.value = kode;

  box.style.display = 'none';
  box.innerHTML = '';

  // PAKSA UPDATE STOK
  setTimeout(() => {
    lookupMaster();
    elQty.focus();
  }, 100);

});
        });
      }

      function showSuggest(query) {
        const box = document.getElementById('suggestBox');
        if (!box) return;

        const q = (query || '').toLowerCase().trim();
        if (!q) {
          box.style.display = 'none';
          box.innerHTML = '';
          return;
        }

        const hits = MASTER
          .filter(it =>
            (it.code && it.code.toLowerCase().includes(q)) ||
            (it.name && it.name.toLowerCase().includes(q)) ||
            (it.barcode && it.barcode.toLowerCase().includes(q))
          )
          .slice(0, 20);

        renderSuggest(hits);
      }


function setMsg(text, ok = true, type = '') {

  msg.style.display = 'block';
  msg.textContent = text;

  if (!ok) {
    msg.style.background = '#fce8e6';
    msg.style.color = '#a50e0e';
    msg.style.border = '2px solid #d93025';
    return;
  }

  // 🔵 MASUK = Biru
  if (type === 'MASUK') {
    msg.style.background = '#e8f0fe';
    msg.style.color = '#0b57d0';
    msg.style.border = '2px solid #1a73e8';
  }

  // 🟢 KELUAR = Hijau
  else if (type === 'KELUAR') {
    msg.style.background = '#e6f4ea';
    msg.style.color = '#137333';
    msg.style.border = '2px solid #34a853';
  }

  // Default success
  else {
    msg.style.background = '#e6f4ea';
    msg.style.color = '#137333';
    msg.style.border = '2px solid #34a853';
  }
}

      function normalizeCode(raw) {
        return (raw || '').toString().trim();
      }

function lookupMaster() {

  const clean = normalizeCode(elCode.value).toUpperCase();
  if (!clean) return;

  const item = MASTER.find(x => 
    x.code.toUpperCase() === clean
  );

  if (!item) {
    setMsg('Barang tidak ditemukan', false);
    return;
  }

  elName.value = item.name;
  elStok.value = item.stock;

  setMsg(`STOK TERSEDIA: ${item.stock}`, true);
}

// AUTO AMBIL DATA SAAT DIKETIK / SCAN
      let lastCode = '';
let lastInputTime = 0;
let scanTimer = null;

elCode.addEventListener('input', () => {

  const now = Date.now();
  const diff = now - lastInputTime;
  lastInputTime = now;

  const code = normalizeCode(elCode.value);

  elName.value = '';
  elStok.value = '';

  showSuggest(code);

  clearTimeout(scanTimer);

  // 🔥 Kalau jarak ketikan sangat cepat → anggap SCAN
  if (diff < 50) {

    lookupMaster(); // langsung tanpa delay

  } else {

    // manual ketik → tetap pakai delay
    scanTimer = setTimeout(() => {

      if (code.length >= 4) {
        lookupMaster();
      }

    }, 150);

  }

});


// 🔥 TAMBAHKAN DI SINI (DI BAWAHNYA)

elCode.addEventListener('keydown', function(e) {

  if (e.key === 'Enter') {

    clearTimeout(scanTimer);

    lookupMaster();

  }

});


btnSave.addEventListener('click', () => {

  initAudio();

const qtyValue = elQty.value.trim();

const payload = {
  code: normalizeCode(elCode.value),
  type: elType.value,
  qty: qtyValue,
  petugas: elPetugas.value,
  password: window.purchasingPassword || ''
};

  if (!payload.petugas) return setMsg('Pilih petugas.', false);
  if (!payload.code) return setMsg('Kode kosong.', false);
const qtyNumber = Number(payload.qty);

if (isNaN(qtyNumber)) {
  return setMsg('Qty harus angka', false);
}

if (qtyNumber === 0) {
  return setMsg('Qty tidak boleh 0', false);
}

let stokSekarang = Number(elStok.value) || 0;
let stokBaru = stokSekarang;

if (payload.type === "MASUK") {
  stokBaru += qtyNumber;
} else {
  if (qtyNumber > stokSekarang) {
    return setMsg(`STOK TIDAK CUKUP. STOK: ${stokSekarang}`, false);
  }
  stokBaru -= qtyNumber;
}

  // 🚀 UPDATE UI LANGSUNG
  elStok.value = stokBaru;
  playSaveBeep();

let pesan = "";
let tipeTampil = payload.type;

if (payload.type === "KELUAR" && payload.qty < 0) {
  pesan = `🔵 ${elName.value}\nBARANG DIKEMBALIKAN: ${Math.abs(payload.qty)}\nSTOK TERSEDIA: ${stokBaru}`;
  tipeTampil = "MASUK"; // supaya warna biru
} else {
  pesan = `✅ ${elName.value}\n${payload.type}: ${payload.qty}\nSTOK TERSEDIA: ${stokBaru}`;
}

setMsg(pesan, true, tipeTampil);

  // 🚀 RESET FORM LANGSUNG (INI YANG BIKIN TERASA CEPAT)
elCode.value = '';
elName.value = '';
elQty.value = '';

// ❌ jangan focus otomatis
// elCode.focus();

// ❌ jangan buka suggest lagi
document.getElementById('suggestBox').style.display = 'none';

// 📡 SERVER JALAN DI BELAKANG

});
</script>

<script>
window.addEventListener("load", function() {

  let codeReader = null;
  let stream = null;
  let isScanning = false;

  const video = document.getElementById('video');
  const btnStartScan = document.getElementById('btnStartScan');
  const btnStopScan = document.getElementById('btnStopScan');

  if (!btnStartScan) {
    console.log("Tombol scan tidak ditemukan");
    return;
  }

  btnStartScan.onclick = async function () {

    if (isScanning) return;

    try {

      stream = await navigator.mediaDevices.getUserMedia({
        video: { facingMode: { ideal: "environment" } }
      });

      video.srcObject = stream;
      await video.play();

      codeReader = new ZXingBrowser.BrowserMultiFormatReader();

      isScanning = true;

      video.style.display = 'block';
      btnStartScan.style.display = 'none';
      btnStopScan.style.display = 'block';

      codeReader.decodeFromVideoDevice(
        null,
        video,
        (result) => {

          if (!isScanning) return;

          if (result) {

            const scannedCode = result.getText().trim();

            stopScan();

            document.getElementById('code').value = scannedCode;

            if (typeof lookupMaster === "function") {
              lookupMaster();
            }

            document.getElementById('qty').focus();
          }
        }
      );

    } catch (err) {
      console.error(err);
      alert("Kamera gagal dibuka. Pastikan izin kamera aktif.");
      stopScan();
    }
  };

  btnStopScan.onclick = stopScan;

  function stopScan() {

    isScanning = false;

    if (codeReader) {
      try { codeReader.reset(); } catch(e){}
    }

    if (stream) {
      stream.getTracks().forEach(track => track.stop());
    }

    video.srcObject = null;

    video.style.display = 'none';
    btnStartScan.style.display = 'block';
    btnStopScan.style.display = 'none';
  }

});
</script>
